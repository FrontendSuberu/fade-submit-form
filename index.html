<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400..600&family=Geist:wght@400..600&display=swap"
      rel="stylesheet"
    />
    <title>fade-submit-form</title>
  </head>
  <body>
    <main class="form-wrapper">
      <form method="post">
        <label to="fullName">
          <!-- full name -->
          <span class="mono">Your name</span>
          <input id="fullName" type="text" required />
        </label>

        <!-- email -->
        <label to="email">
          <span class="mono">your email address</span>
          <input id="email" type="email" required />
        </label>

        <!-- submit button -->
        <button role="button" type="submit">submit</button>
      </form>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
