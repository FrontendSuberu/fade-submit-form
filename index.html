<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>fade-submit-form</title>
  </head>
  <body>
    <main class="form-wrapper">
      <form id="form-element-wrapper" method="post" novalidate>
        <label class="form-label" for="fullName">
          <!-- full name -->
          <span class="mono">Your name</span>
          <span id="warningBlock" class="mono wn-text"></span>
          <input
            id="fullName"
            class="form-field"
            placeholder="name goes here"
            type="text"
            required
          />
        </label>

        <!-- email -->
        <label class="form-label" for="email">
          <span class="mono">your email address</span>
          <span id="warningBlock" class="mono wn-text"></span>
          <input
            id="email"
            class="form-field"
            type="email"
            placeholder="your@email.com"
            required
          />
        </label>

        <!-- submit button -->
        <button type="submit" class="submitBtn" id="submitBtn" role="button">submit</button>
      </form>

      <span id="form-status"></span>  
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
