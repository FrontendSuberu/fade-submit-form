<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>fade-submit-form</title>
  </head>
  <body>
    <main class="form-wrapper">
      <form method="post">
        <label class="form-label" to="fullName">
          <!-- full name -->
          <span class="mono">Your name</span>
          <span class="mono">name is too short</span>
          <input id="fullName" class="form-field" placeholder="name goes here" type="text" required />
        </label>

        <!-- email -->
        <label class="form-label" to="email">
          <span class="mono">your email address</span>
          <span class="mono">email does not have @. email. . is used in the wrong position</span>
          <input id="email" class="form-field" type="email" placeholder="your@email.com" required />
        </label>

        <!-- submit button -->
        <button type="submit" id="submitBtn" role="button">
        submit
        </button>
      </form>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
